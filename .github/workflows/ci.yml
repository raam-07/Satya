name: CI — build & type check

# Catches compile errors, type errors, and runtime issues like
# DYNAMIC_SERVER_USAGE (surfaced when `next build` statically generates pages)
# BEFORE they reach Render.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (static generation catches DYNAMIC_SERVER_USAGE)
        # No DB creds on purpose: data fetches fail and pages build empty,
        # but compile / type / dynamic-usage errors are still caught.
        # This keeps CI from making ANY Turso reads (protects the free-tier limit).
        run: npm run build
